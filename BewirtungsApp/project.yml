name: BewirtungsApp
options:
  bundleIdPrefix: com.bewirtungsapp
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: BewirtungsApp/Info.plist
    DEVELOPMENT_TEAM: ""

targets:
  BewirtungsApp:
    type: application
    platform: iOS
    sources:
      - BewirtungsApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bewirtungsapp.app
        INFOPLIST_FILE: BewirtungsApp/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
    info:
      path: BewirtungsApp/Info.plist
      properties:
        CFBundleDisplayName: Bewirtung
        UILaunchScreen: {}
        NSCameraUsageDescription: "Die App benötigt Zugriff auf die Kamera, um Bewirtungsbelege zu fotografieren und per OCR auszulesen."
        ITSAppUsesNonExemptEncryption: false
